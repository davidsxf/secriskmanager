<!DOCTYPE html>
{% load tailwind_cli %}
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — SecRiskManager</title>
    {% tailwind_css %}
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-4">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-600">SecRiskManager</h1>
            <p class="mt-2 text-sm text-gray-500">安全风险 IP/域名 管理系统</p>
        </div>
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-8">
            <h2 class="text-lg font-medium text-gray-900 mb-6">登录</h2>
            <form method="post" class="space-y-6">
                {% csrf_token %}
                {% if form.errors %}
                <div class="rounded-md bg-red-50 p-4">
                    <p class="text-sm text-red-700">用户名或密码错误，请重试。</p>
                </div>
                {% endif %}
                <div>
                    <label for="id_username" class="block text-sm font-medium text-gray-700">用户名</label>
                    <input type="text" name="username" id="id_username" required
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
                </div>
                <div>
                    <label for="id_password" class="block text-sm font-medium text-gray-700">密码</label>
                    <input type="password" name="password" id="id_password" required
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
                </div>
                <button type="submit"
                        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    登录
                </button>
            </form>
        </div>
    </div>
</body>
</html>
