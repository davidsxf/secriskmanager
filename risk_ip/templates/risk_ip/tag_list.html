{% extends "base.html" %}
{% block title %}标签管理{% endblock %}
{% block content %}
<div class="flex justify-between items-center mb-6">
    <div>
        <h1 class="text-2xl font-bold text-gray-900">标签管理</h1>
        <p class="mt-1 text-sm text-gray-500">管理 IP/域名 分类标签</p>
    </div>
    <a href="{% url 'risk_ip:tag_create' %}" class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700">+ 新增标签</a>
</div>
{% if tags %}
<div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">名称</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">颜色</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">说明</th>
                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">操作</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
            {% for tag in tags %}
            <tr class="hover:bg-gray-50">
                <td class="px-6 py-4 whitespace-nowrap">
                    <span class="inline-flex items-center gap-2 px-3 py-1 rounded-full text-xs font-medium" style="background-color: {{ tag.color }}; color: white;">
                        {{ tag.name }}
                    </span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <div class="flex items-center gap-2">
                        <div class="w-5 h-5 rounded border border-gray-300" style="background-color: {{ tag.color }};"></div>
                        <span class="text-sm font-mono text-gray-500">{{ tag.color }}</span>
                    </div>
                </td>
                <td class="px-6 py-4 text-sm text-gray-500">{{ tag.description|default:"-" }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                    <a href="{% url 'risk_ip:tag_delete' tag.pk %}" class="text-red-600 hover:text-red-900">删除</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<div class="bg-white rounded-lg shadow-sm border border-gray-200 p-12 text-center">
    <p class="text-gray-500 text-lg">暂无标签</p>
    <a href="{% url 'risk_ip:tag_create' %}" class="mt-4 inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700">创建第一个标签</a>
</div>
{% endif %}
{% endblock %}
