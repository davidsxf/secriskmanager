{% extends "base.html" %}
{% block title %}确认导入{% endblock %}
{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">确认导入</h1>
    <p class="mt-1 text-sm text-gray-500">请确认以下统计信息，确认后开始导入</p>
</div>

<div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 text-center">
        <p class="text-3xl font-bold text-blue-600">{{ total|default:0 }}</p>
        <p class="text-sm text-gray-500 mt-1">文件总条数</p>
    </div>
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 text-center">
        <p class="text-3xl font-bold text-yellow-600">{{ exist_count|default:0 }}</p>
        <p class="text-sm text-gray-500 mt-1">库中已存在（将更新来源）</p>
    </div>
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 text-center">
        <p class="text-3xl font-bold text-green-600">{{ new_count|default:0 }}</p>
        <p class="text-sm text-gray-500 mt-1">新增条目</p>
    </div>
</div>

<div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 max-w-xl">
    <form method="post" action="{% url 'risk_ip:import_confirm' %}">
        {% csrf_token %}
        <div class="flex justify-end gap-3">
            <a href="{% url 'risk_ip:import' %}" class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">取消</a>
            <button type="submit" class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700">开始导入</button>
        </div>
    </form>
</div>
{% endblock %}
