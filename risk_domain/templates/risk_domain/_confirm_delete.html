{% extends "base.html" %}
{% block title %}确认删除{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto mt-12">
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-8 text-center">
        <h2 class="text-xl font-bold text-gray-900 mb-4">确认删除</h2>
        <p class="text-gray-600 mb-2">确定要删除以下域名吗？</p>
        <p class="text-lg font-mono font-bold text-red-600 mb-6">{% if object.prefix_at %}@{% endif %}{{ object.domain }}</p>
        <form method="post">
            {% csrf_token %}
            <div class="flex justify-center gap-3">
                <a href="{% url 'risk_domain:list' %}" class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">取消</a>
                <button type="submit" class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-red-600 hover:bg-red-700">确认删除</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
